<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jumper Studio - Briefing Quiz</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="status-panel" aria-label="Resumo do quiz">
        <div class="brand-block">
          <img class="brand-logo" src="./assets/jumper-jp.png" alt="Jumper" />
          <div>
            <p class="eyebrow">Jumper Studio</p>
            <h1>Briefing do seu site</h1>
            <p class="brand-line">Responda para definirmos estrutura, conteúdo e direção visual do seu novo site.</p>
          </div>
        </div>

        <details class="live-summary" aria-label="Diagnóstico do site" open>
          <summary>
            <span>Diagnóstico do site</span>
            <strong id="summary-score">0.0 /10</strong>
          </summary>
          <div class="summary-console">
            <div class="progress-card">
              <div class="progress-copy">
                <span id="step-count">Etapa 1 de 7</span>
                <strong id="step-title" aria-hidden="true"></strong>
              </div>
              <div class="progress-track" aria-hidden="true">
                <span id="progress-bar"></span>
              </div>
            </div>
            <div class="summary-console-head" aria-hidden="true">
              <span>Sala de máquinas · Briefing · ao vivo <i></i></span>
            </div>
            <dl id="summary-list"></dl>
          </div>
        </details>
      </aside>

      <section class="quiz-panel" aria-live="polite">
        <form id="quiz-form">
          <div id="step-container"></div>

          <footer class="actions">
            <button class="icon-button" id="prev-button" type="button" aria-label="Voltar etapa">
              <span aria-hidden="true">←</span>
            </button>
            <button class="ghost-button" id="reset-button" type="button">Limpar</button>
            <button class="primary-button" id="next-button" type="button">Continuar</button>
          </footer>
        </form>
      </section>
    </main>

    <script src="./quiz.js"></script>
  </body>
</html>
